name: Docker Multi-Platform Build Pipeline

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which image to build'
        required: true
        type: choice
        options:
          - pvxs
  push:
    branches:
      - 'tls'

jobs:
  check_docker_changes:
    runs-on: ubuntu-22.04
    outputs:
      non_docker_changed: ${{ steps.filter.outputs.non_docker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            non_docker:
              - 'src/**'
              - 'include/**'
              - 'test/**'
              - 'example/[!docker]/**'

  build-pvxs:
    needs: [check_docker_changes]
    if: |
      always() && 
      (github.event_name == 'workflow_dispatch' && 
       github.event.inputs.build_target == 'pvxs') || 
      (github.event_name == 'push' && 
       needs.check_docker_changes.outputs.non_docker_changed == 'true')
    runs-on: ubuntu-22.04
    outputs:
      status: ${{ job.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: tls
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push pvxs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: example/docker/pvxs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          build-args: |
            DOCKER_REGISTRY=ghcr.io
            DOCKER_USERNAME=slac-epics
          tags: ghcr.io/slac-epics/pvxs:latest
